name: Roblox Update Watcher

on:
  workflow_dispatch:
    inputs:
      announce_startup:
        description: "Send the current version and hash now"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

concurrency:
  group: roblox-update-watcher
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check Roblox versions
        run: npm run check
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          ANNOUNCE_STARTUP: ${{ github.event_name == 'workflow_dispatch' && inputs.announce_startup || 'false' }}

      - name: Save state
        run: |
          if [ -n "$(git status --porcelain state.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add state.json
            git commit -m "Update Roblox watcher state"
            git push
          fi
